name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   
  packages: write   

jobs:
  binaries:
    name: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: go test ./...

      - name: Cross-compile
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # CGO off keeps every target a static, dependency-free binary.
          export CGO_ENABLED=0
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            out="backwyn"
            [ "$os" = "windows" ] && out="backwyn.exe"
            echo "building $os/$arch"
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags="-s -w -X main.version=$VERSION" \
              -o "dist/$out" ./cmd/backwyn
            ( cd dist && tar -czf "backwyn_${VERSION}_${os}_${arch}.tar.gz" "$out" && rm -f "$out" )
          done
          # Checksums let users verify a download of a tool they'll trust with a
          # production database connection.
          ( cd dist && sha256sum *.tar.gz > checksums.txt )
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            Download the archive for your platform below, or use the image:

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            Binaries need `pg_dump`, `pg_restore`, and `psql` on PATH
            (version >= your database server). The image bundles them.

            Verify your download against `checksums.txt`.

  image:
    name: container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
